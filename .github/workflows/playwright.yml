name: ing.pl cookie consent

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  e2e:
    name: ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers (on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.browser }}

      - name: Install Playwright OS Dependencies
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Inject auth state from secret
        if: ${{ env.PLAYWRIGHT_AUTH_JSON != '' }}
        env:
          PLAYWRIGHT_AUTH_JSON: ${{ secrets.PLAYWRIGHT_AUTH_JSON }}
        run: |
          mkdir -p playwright/.auth
          echo "$PLAYWRIGHT_AUTH_JSON" > playwright/.auth/user.json

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
